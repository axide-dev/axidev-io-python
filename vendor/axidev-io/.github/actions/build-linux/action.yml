name: Build (Linux)
description: Build, test, and optionally package axidev-io on Linux with build.py.

inputs:
  arch:
    description: Architecture label used for artifact naming (e.g. x64, arm64)
    required: true
  build-tests:
    description: Compatibility input retained for workflow callers
    required: false
    default: "false"
  build-integration-tests:
    description: Build the interactive integration binaries
    required: false
    default: "false"
  run-tests:
    description: Run unit tests after building
    required: false
    default: "false"
  package-output:
    description: Package headers, the static library, consumer docs, LICENSE, and vendor/licenses into packages/
    required: false
    default: "false"
  package-integration-tests:
    description: Package integration binaries, consumer docs, licenses, and Linux helpers into packages/
    required: false
    default: "false"
  upload-binaries:
    description: Upload built test binaries as artifacts
    required: false
    default: "false"
  upload-integration-package:
    description: Upload packaged integration test zip artifacts
    required: false
    default: "false"
  artifact-name:
    description: Artifact name used when uploading outputs
    required: false
  version:
    description: Release version override (otherwise uses tag ref)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Install dependencies (Linux)
      shell: bash
      run: |
        # Install shared-library development packages from the runner image.
        # These Linux dependencies must stay dynamically linked for
        # legal/compliance reasons. build.py enforces that policy and only uses
        # pkg-config to discover system headers and shared-library link flags.
        sudo apt-get update
        sudo apt-get install -y \
          build-essential pkg-config \
          libinput-dev libxkbcommon-dev libudev-dev

    - name: Clean stale build directory
      shell: bash
      run: python build.py clean

    - name: Build library
      if: ${{ inputs.run-tests != 'true' && inputs.build-integration-tests != 'true' && inputs.package-output != 'true' && inputs.package-integration-tests != 'true' }}
      shell: bash
      run: python build.py build

    - name: Build integration binaries
      if: ${{ inputs.build-integration-tests == 'true' }}
      shell: bash
      run: python build.py integration-binaries

    - name: Build Linux linkage probe binary
      if: ${{ inputs.build-integration-tests != 'true' }}
      shell: bash
      run: python build.py integration-binaries

    - name: Run unit tests
      if: ${{ inputs.run-tests == 'true' }}
      shell: bash
      run: python build.py test

    - name: Verify Linux dependencies stay dynamically linked
      shell: bash
      run: |
        set -euo pipefail

        probe="build/linux/bin/test_integration_listener"
        if [ ! -x "$probe" ]; then
          echo "::error::Missing Linux linkage probe binary: $probe"
          exit 1
        fi

        # This explicit runtime-loader check exists for legal/compliance
        # reasons. These dependencies must resolve as shared libraries and must
        # not be folded into the produced binaries as static archives.
        ldd_output="$(ldd "$probe")"
        printf '%s\n' "$ldd_output"

        printf '%s\n' "$ldd_output" | grep -E 'libinput\.so'
        printf '%s\n' "$ldd_output" | grep -E 'libudev\.so'
        printf '%s\n' "$ldd_output" | grep -E 'libxkbcommon\.so'

        if printf '%s\n' "$ldd_output" | grep -E 'not found'; then
          echo "::error::One or more required shared libraries were not resolved by ldd."
          exit 1
        fi

    - name: Package (Linux)
      if: ${{ inputs.package-output == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        # Release archives must carry the consumer guide, project license, and
        # vendored third-party license notices. build.py package is the single
        # source of truth for that layout.
        TAG='${{ inputs.version }}'
        if [ -z "$TAG" ]; then
          TAG="${GITHUB_REF#refs/tags/}"
        fi
        python build.py package --version "$TAG" --arch '${{ inputs.arch }}'

    - name: Package integration tests (Linux)
      if: ${{ inputs.package-integration-tests == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        TAG='${{ inputs.version }}'
        if [ -z "$TAG" ]; then
          TAG="dev"
        fi
        python build.py package-integration-tests --version "$TAG" --arch '${{ inputs.arch }}'

    - name: Upload release package
      if: ${{ inputs.package-output == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: release-package-linux-${{ inputs.arch }}
        path: packages/*.tar.gz

    - name: Upload test binaries
      if: ${{ inputs.upload-binaries == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: |
          build/linux/bin/test_*

    - name: Upload integration test package
      if: ${{ inputs.upload-integration-package == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: |
          packages/*.zip
